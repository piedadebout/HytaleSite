services:
  mysql:
    image: mysql:8.4
    container_name: myapp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Rayjir
      MYSQL_DATABASE: CronosDatabase
      MYSQL_USER: CronosAdmin
      MYSQL_PASSWORD: calistoProtocol
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # (Opcional) Interface web pra ver o banco no navegador
  phpmyadmin:
    image: phpmyadmin:5
    container_name: myapp-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8081:80"

volumes:
  mysql_data: